<style>
  :root{
    --bg:#0c0d11; --bg2:#14161d; --card:#1a1d26; --card2:#21252f;
    --line:#2b2f3a; --txt:#eef1f6; --muted:#8a90a0; --target:#ffd089;
    --accent:#ff4d4d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:'Hanken Grotesk',sans-serif;overscroll-behavior-y:contain;}
  body{padding-bottom:40px;}
  .wrap{max-width:560px;margin:0 auto;position:relative;z-index:1;}

  /* Painted gym backdrop */
  #bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:#0c0d11;}
  #bg svg, #bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.95;}
  #bg .scrim{position:absolute;inset:0;background:
    radial-gradient(135% 85% at 50% 22%, rgba(12,13,17,0) 0%, rgba(12,13,17,.14) 52%, rgba(12,13,17,.60) 100%),
    linear-gradient(180deg, rgba(12,13,17,.80) 0%, rgba(12,13,17,.34) 32%, rgba(12,13,17,.40) 64%, rgba(12,13,17,.82) 100%);}

  /* Header */
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,rgba(12,13,17,.92) 60%,rgba(12,13,17,.0));
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);padding:16px 16px 8px;}
  .brand{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:'Anton',sans-serif;font-size:30px;letter-spacing:1px;line-height:1;}
  .logo span{color:var(--accent);}
  .tagline{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  .credit{text-align:right;font-size:9px;line-height:1.45;letter-spacing:1px;text-transform:uppercase;
    color:var(--muted);flex:none;align-self:flex-start;padding-top:2px;}
  .credit b{display:block;color:var(--txt);font-size:11px;letter-spacing:.5px;}

  .weekbar{display:flex;align-items:center;gap:10px;margin-top:14px;
    background:rgba(20,22,27,.62);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:8px;}
  .wbtn{width:40px;height:40px;border:none;border-radius:10px;background:rgba(255,255,255,.08);
    color:var(--txt);font-size:22px;font-weight:700;cursor:pointer;flex:none;}
  .wbtn:active{transform:scale(.93);}
  .winfo{flex:1;text-align:center;}
  .wnum{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:1px;line-height:1;}
  .wsets{font-size:11px;color:var(--muted);margin-top:3px;}

  /* Day pills */
  .days{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 6px;scrollbar-width:none;}
  .days::-webkit-scrollbar{display:none;}
  .pill{flex:none;border:1px solid rgba(255,255,255,.1);background:rgba(26,29,38,.6);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);color:var(--muted);
    padding:9px 15px;border-radius:999px;font-weight:700;font-size:13px;cursor:pointer;
    transition:.15s;white-space:nowrap;}
  .pill.active{color:#0c0d11;background:var(--accent);border-color:var(--accent);}
  .pill .pd{display:block;font-size:10px;font-weight:600;opacity:.7;letter-spacing:1px;text-transform:uppercase;}

  /* Day header */
  .dayhead{padding:10px 16px 4px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .daytitle{font-family:'Anton',sans-serif;font-size:19px;letter-spacing:.5px;}
  .copybtn{flex:none;font-size:11px;font-weight:700;color:var(--accent);background:transparent;
    border:1px solid var(--accent);border-radius:999px;padding:7px 11px;cursor:pointer;}
  .copybtn:disabled{opacity:.35;border-color:var(--muted);color:var(--muted);}

  .progress{height:6px;background:rgba(255,255,255,.08);border-radius:99px;margin:6px 16px 4px;overflow:hidden;}
  .progress>div{height:100%;background:var(--accent);width:0;transition:width .3s;}

  /* Cards */
  .list{padding:8px 16px 0;}
  .group{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
    color:var(--muted);margin:16px 4px 6px;text-shadow:0 1px 6px rgba(0,0,0,.7);}
  .card{background:rgba(18,21,29,.5);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.1);border-radius:16px;
    padding:13px 13px 6px;margin-bottom:10px;box-shadow:0 6px 22px rgba(0,0,0,.4);}

  /* Superset block */
  .superset{border:1.5px solid var(--accent);border-radius:18px;padding:8px;margin-bottom:12px;
    background:linear-gradient(180deg,rgba(255,255,255,.025),transparent);}
  .sshead{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:800;
    letter-spacing:2px;text-transform:uppercase;color:var(--accent);padding:4px 6px 7px;}
  .sshead .chain{font-size:13px;}
  .superset .card{margin-bottom:0;border-color:var(--line);}
  .ssplus{text-align:center;color:var(--accent);font-family:'Anton',sans-serif;
    font-size:16px;line-height:1;padding:5px 0;}
  .crow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .cname{font-size:16px;font-weight:800;line-height:1.15;}
  .cnum{font-family:'Space Mono',monospace;color:var(--accent);margin-right:6px;}
  .ctarget{flex:none;font-size:11px;font-weight:700;color:var(--target);
    background:rgba(255,208,137,.1);border:1px solid rgba(255,208,137,.25);
    border-radius:8px;padding:4px 8px;white-space:nowrap;}

  .sets{display:flex;flex-direction:column;gap:7px;margin-top:11px;}
  .setrow{display:grid;grid-template-columns:34px 1fr 1fr;gap:8px;align-items:center;}
  .setctrl{display:flex;align-items:center;justify-content:center;gap:16px;padding:9px 0 7px;margin-top:6px;
    border-top:1px solid rgba(255,255,255,.07);}
  .sbtn{width:32px;height:32px;border-radius:9px;border:1px solid rgba(255,255,255,.16);
    background:rgba(255,255,255,.07);color:var(--txt);font-size:19px;font-weight:700;line-height:1;cursor:pointer;}
  .sbtn:active{transform:scale(.9);}
  .setcount{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--muted);min-width:54px;text-align:center;}
  .slabel{font-size:11px;font-weight:700;color:var(--muted);text-align:center;
    background:rgba(255,255,255,.06);border-radius:8px;padding:9px 0;}
  .field{position:relative;}
  .field input{width:100%;border:1px solid rgba(255,255,255,.12);background:rgba(14,16,21,.78);color:var(--txt);
    border-radius:10px;padding:11px 10px 11px;font-size:16px;font-weight:700;
    font-family:'Space Mono',monospace;text-align:center;outline:none;}
  .field input:focus{border-color:var(--accent);background:#191b23;}
  .field input.filled{border-color:#3a8f5e;}
  .field .ph{position:absolute;top:-7px;left:9px;font-size:9px;font-weight:800;
    letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:var(--card);padding:0 4px;}

  .footer{text-align:center;color:var(--muted);font-size:11px;padding:24px 16px 8px;}
  .footer b{color:var(--txt);}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#2a2e3a;border:1px solid var(--line);color:var(--txt);padding:9px 16px;
    border-radius:999px;font-size:12px;font-weight:700;opacity:0;transition:.25s;z-index:50;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .loading{padding:60px 20px;text-align:center;color:var(--muted);}

  /* editable exercise name */
  .cnm{cursor:pointer;}
  .editpen{font-size:11px;color:var(--muted);margin-left:6px;cursor:pointer;opacity:.7;}
  .nameedit{font-size:16px;font-weight:800;color:var(--txt);background:rgba(14,16,21,.9);
    border:1px solid var(--accent);border-radius:8px;padding:4px 8px;width:75%;outline:none;}

  /* check-in tab */
  .checkin{padding:8px 16px 0;}
  .cicard{padding:15px 16px;}
  .cilabel{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
  .cistat{font-family:'Anton',sans-serif;font-size:46px;line-height:1;color:var(--txt);margin-top:6px;}
  .cistat span{font-family:'Hanken Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--muted);margin-left:8px;}
  .cibar{height:8px;background:rgba(255,255,255,.08);border-radius:99px;margin-top:12px;overflow:hidden;}
  .cibar>div{height:100%;background:var(--accent);}
  .cirow{display:flex;align-items:baseline;gap:10px;margin-top:10px;}
  .ciInput{flex:1;font-family:'Space Mono',monospace;font-size:26px;font-weight:700;color:var(--txt);
    background:rgba(14,16,21,.78);border:1px solid rgba(255,255,255,.12);border-radius:12px;
    padding:10px 14px;outline:none;}
  .ciInput:focus{border-color:var(--accent);}
  .ciunit{font-size:14px;font-weight:700;color:var(--muted);}
  .cinote{margin-top:10px;font-size:13px;font-weight:700;color:var(--accent);}
  .cigoalset{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
  .cigoalval{font-family:'Anton',sans-serif;font-size:32px;line-height:1;color:var(--txt);}
  .cigoalval small{font-family:'Hanken Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--muted);}
  .cilink{background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:999px;
    padding:8px 15px;font-size:12px;font-weight:800;cursor:pointer;flex:none;}
  .cisub{font-weight:700;color:var(--muted);letter-spacing:1px;}
  .ciArea{width:100%;min-height:80px;margin-top:10px;resize:vertical;font-family:'Hanken Grotesk',sans-serif;
    font-size:14px;color:var(--txt);background:rgba(14,16,21,.78);border:1px solid rgba(255,255,255,.12);
    border-radius:12px;padding:11px 13px;outline:none;}
  .ciArea:focus{border-color:var(--accent);}

  /* export button */
  .exportwrap{padding:18px 16px 0;}
  .exportbtn{width:100%;padding:15px;border:none;border-radius:14px;background:var(--accent);
    color:#0c0d11;font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-weight:800;
    letter-spacing:.5px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.35);}
  .exportbtn:active{transform:scale(.98);}

  /* print */
  #printArea{display:none;}
  @media print{
    body{background:#fff;}
    #bg,.wrap,.toast{display:none !important;}
    #printArea{display:block;color:#111;font-family:Arial,Helvetica,sans-serif;padding:0 6px;}
    .rpt h1{font-size:22px;margin:0 0 2px;} .rpt h1 span{color:#c0392b;font-weight:700;}
    .rpt h2{font-size:14px;margin:16px 0 5px;border-bottom:2px solid #111;padding-bottom:2px;}
    .rmeta{font-size:11px;margin-bottom:8px;} .rnote{font-size:11px;margin:4px 0 8px;}
    .rpt table{width:100%;border-collapse:collapse;font-size:11px;}
    .rpt th,.rpt td{border:1px solid #999;padding:4px 6px;text-align:left;vertical-align:top;}
    .rpt th{background:#eee;} .rpt tr{page-break-inside:avoid;}
    .rpt h2{page-break-after:avoid;}
  }
</style>

// ---- storage layer: Claude preview -> device localStorage -> in-memory ----
const hasStore = typeof window.storage !== "undefined" && window.storage;
let hasLS=false; try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); hasLS=true; }catch(e){ hasLS=false; }
const mem = {};
async function sGet(k){
  if(hasStore){ try{ const r=await window.storage.get(k,false); return r?r.value:null; }catch(e){ return null; } }
  if(hasLS){ try{ return localStorage.getItem("liftlog_"+k); }catch(e){} }
  return k in mem ? mem[k] : null;
}
async function sSet(k,v){
  if(hasStore){ try{ await window.storage.set(k,v,false); return; }catch(e){} }
  if(hasLS){ try{ localStorage.setItem("liftlog_"+k,v); return; }catch(e){} }
  mem[k]=v;
}

let week = 1, day = 0, weekData = {}, weekCounts = {};
let customNames = {}, bodyweights = {}, checkinNotes = {}, goalWeight = "";
let editingGoal = false;
let saveTimer = null;
const CHECKIN_ACCENT = "#19c3a6";

const $ = s=>document.querySelector(s);
const esc = s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function exId(dk,n){ return dk+"-"+n; }
function getCount(d,it){ const id=exId(d.key,it.n); return weekCounts[id] || it.sets; }
function saveCounts(){ sSet("count_week_"+week, JSON.stringify(weekCounts)); }
function getName(d,it){ const id=exId(d.key,it.n); return customNames[id] || it.name; }
function editName(d,it,el){
  const id=exId(d.key,it.n);
  const inp=document.createElement("input");
  inp.className="nameedit"; inp.value=getName(d,it); inp.maxLength=42;
  el.replaceWith(inp); inp.focus(); inp.select();
  const commit=()=>{
    const v=inp.value.trim();
    if(v && v!==it.name) customNames[id]=v; else delete customNames[id];
    sSet("names", JSON.stringify(customNames));
    render();
  };
  inp.addEventListener("blur",commit);
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); inp.blur(); }
    if(e.key==="Escape"){ inp.value=getName(d,it); inp.blur(); } });
}

async function loadWeek(){
  const raw = await sGet("week_"+week);
  weekData = raw ? JSON.parse(raw) : {};
  const rawc = await sGet("count_week_"+week);
  weekCounts = rawc ? JSON.parse(rawc) : {};
}
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ sSet("week_"+week, JSON.stringify(weekData)); toast("Saved"); }, 450);
}
function changeCount(d,it,delta){
  const id=exId(d.key,it.n);
  let c=Math.max(1, Math.min(12, getCount(d,it)+delta));
  weekCounts[id]=c; saveCounts(); render();
}

function countSets(){
  let filled=0,total=0;
  PROGRAM.forEach(d=>d.items.forEach(it=>{
    if(it.name){ const n=getCount(d,it); total+=n;
      const arr=weekData[exId(d.key,it.n)]||[];
      for(let i=0;i<n;i++){ if(arr[i]&&(arr[i].w||arr[i].r)) filled++; }
    }
  }));
  return {filled,total};
}
function countDay(d){
  let filled=0,total=0;
  d.items.forEach(it=>{ if(it.name){ const n=getCount(d,it); total+=n;
    const arr=weekData[exId(d.key,it.n)]||[];
    for(let i=0;i<n;i++){ if(arr[i]&&(arr[i].w||arr[i].r)) filled++; }
  }});
  return {filled,total};
}

function renderDays(){
  const c=$("#days"); c.innerHTML="";
  PROGRAM.forEach((d,i)=>{
    const b=document.createElement("button");
    b.className="pill"+(i===day?" active":"");
    if(i===day) b.style.background=d.accent, b.style.borderColor=d.accent;
    b.innerHTML=`${d.short}<span class="pd">${d.focus}</span>`;
    b.onclick=()=>{ day=i; render(); };
    c.appendChild(b);
  });
  const ci=document.createElement("button");
  const isCI = day>=PROGRAM.length;
  ci.className="pill"+(isCI?" active":"");
  if(isCI) ci.style.background=CHECKIN_ACCENT, ci.style.borderColor=CHECKIN_ACCENT;
  ci.innerHTML=`Check-In<span class="pd">Weekly</span>`;
  ci.onclick=()=>{ day=PROGRAM.length; render(); };
  c.appendChild(ci);
}

function renderCheckin(){
  document.documentElement.style.setProperty("--accent",CHECKIN_ACCENT);
  $("#dayTitle").textContent="Weekly Check-In";
  $("#copyBtn").style.display="none";
  $("#progress").style.display="none";
  const w=countSets();
  const bw = bodyweights[week]!=null ? bodyweights[week] : "";
  const note = checkinNotes[week] || "";
  const wk1 = bodyweights[1];
  let goalLine="";
  if(goalWeight!=="" && bw!==""){
    const diff=(parseFloat(goalWeight)-parseFloat(bw));
    if(!isNaN(diff)) goalLine = diff===0 ? "At goal 🎯" : (diff>0? diff.toFixed(1)+" to go":Math.abs(diff).toFixed(1)+" past goal");
  }
  let sinceLine="";
  if(wk1!=null && wk1!=="" && bw!=="" && week>1){
    const ch=(parseFloat(bw)-parseFloat(wk1));
    if(!isNaN(ch)) sinceLine = (ch>=0?"+":"")+ch.toFixed(1)+" since Week 1";
  }

  const goalSet = goalWeight!=="" && !editingGoal;
  const goalInner = goalSet
    ? `<div class="cilabel">Goal bodyweight</div>
       <div class="cigoalset"><span class="cigoalval">${esc(goalWeight)} <small>lb</small></span>
       <button id="ciGoalEdit" class="cilink">Edit</button></div>
       ${goalLine?`<div class="cinote">${goalLine}</div>`:""}`
    : `<div class="cilabel">Goal bodyweight <span class="cisub">· set once</span></div>
       <div class="cirow">
         <input id="ciGoal" class="ciInput" inputmode="decimal" placeholder="e.g. 185" value="${esc(goalWeight)}">
         <span class="ciunit">lb</span>
         <button id="ciGoalSave" class="cilink">Save</button>
       </div>`;

  const list=$("#list"); list.innerHTML="";
  const wrap=document.createElement("div"); wrap.className="checkin";
  wrap.innerHTML=`
    <div class="card cicard">
      <div class="cilabel">Sets logged · Week ${week}</div>
      <div class="cistat">${w.filled}<span>/ ${w.total}</span></div>
      <div class="cibar"><div style="width:${w.total?(w.filled/w.total*100):0}%"></div></div>
    </div>
    <div class="card cicard">
      <div class="cilabel">Bodyweight this week</div>
      <div class="cirow">
        <input id="ciBW" class="ciInput" inputmode="decimal" placeholder="—" value="${esc(bw)}">
        <span class="ciunit">lb</span>
      </div>
      ${sinceLine?`<div class="cinote">${sinceLine}</div>`:""}
    </div>
    <div class="card cicard">${goalInner}</div>
    <div class="card cicard">
      <div class="cilabel">Notes for the week</div>
      <textarea id="ciNote" class="ciArea" placeholder="How did training feel? Sleep, diet, energy…">${esc(note)}</textarea>
    </div>`;
  list.appendChild(wrap);

  const bwI=$("#ciBW"), noteI=$("#ciNote");
  bwI.addEventListener("input",()=>{ const v=bwI.value.trim();
    if(v==="") delete bodyweights[week]; else bodyweights[week]=v;
    sSet("bodyweights",JSON.stringify(bodyweights)); });
  bwI.addEventListener("blur",render);
  noteI.addEventListener("input",()=>{ const v=noteI.value;
    if(v==="") delete checkinNotes[week]; else checkinNotes[week]=v;
    sSet("checkin_notes",JSON.stringify(checkinNotes)); });

  if(goalSet){
    $("#ciGoalEdit").onclick=()=>{ editingGoal=true; render(); };
  } else {
    const gI=$("#ciGoal");
    $("#ciGoalSave").onclick=()=>{ goalWeight=gI.value.trim(); sSet("goal_weight",goalWeight); editingGoal=false; render(); };
    gI.addEventListener("keydown",e=>{ if(e.key==="Enter"){ goalWeight=gI.value.trim(); sSet("goal_weight",goalWeight); editingGoal=false; render(); } });
  }

  updateMeta();
}

function render(){
  renderDays();
  if(day>=PROGRAM.length){ renderCheckin(); return; }
  const d=PROGRAM[day];
  document.documentElement.style.setProperty("--accent",d.accent);
  $("#dayTitle").textContent=d.title;
  $("#copyBtn").style.display="";
  $("#progress").style.display="";

  const list=$("#list"); list.innerHTML="";
  let ssCur=null, ssBox=null;
  d.items.forEach(it=>{
    if(it.g){ ssCur=null; ssBox=null;
      const g=document.createElement("div"); g.className="group"; g.textContent=it.g; list.appendChild(g); return; }

    const card=document.createElement("div"); card.className="card";
    card.innerHTML=`<div class="crow"><div class="cname"><span class="cnum">${it.n}</span><span class="cnm">${esc(getName(d,it))}</span><span class="editpen">✎</span></div>
      <div class="ctarget">${esc(it.t)}</div></div>`;
    const cnmEl=card.querySelector(".cnm");
    cnmEl.onclick=()=>editName(d,it,card.querySelector(".cnm"));
    card.querySelector(".editpen").onclick=()=>editName(d,it,card.querySelector(".cnm"));
    const sets=document.createElement("div"); sets.className="sets";
    const arr=weekData[exId(d.key,it.n)]||[];
    const ncount=getCount(d,it);
    for(let i=0;i<ncount;i++){
      const row=document.createElement("div"); row.className="setrow";
      const cur=arr[i]||{w:"",r:""};
      row.innerHTML=`<div class="slabel">${i+1}</div>
        <div class="field"><span class="ph">Weight</span><input inputmode="text" data-ex="${exId(d.key,it.n)}" data-i="${i}" data-f="w" value="${esc(cur.w||"")}"></div>
        <div class="field"><span class="ph">Reps</span><input inputmode="numeric" data-ex="${exId(d.key,it.n)}" data-i="${i}" data-f="r" value="${esc(cur.r||"")}"></div>`;
      sets.appendChild(row);
    }
    card.appendChild(sets);

    const ctrl=document.createElement("div"); ctrl.className="setctrl";
    const minus=document.createElement("button"); minus.className="sbtn"; minus.textContent="−";
    const plus=document.createElement("button"); plus.className="sbtn"; plus.textContent="+";
    const lbl=document.createElement("span"); lbl.className="setcount"; lbl.textContent=ncount+(ncount===1?" set":" sets");
    minus.onclick=()=>changeCount(d,it,-1);
    plus.onclick=()=>changeCount(d,it,1);
    ctrl.appendChild(minus); ctrl.appendChild(lbl); ctrl.appendChild(plus);
    card.appendChild(ctrl);

    if(it.ss){
      if(it.ss!==ssCur){
        ssCur=it.ss;
        ssBox=document.createElement("div"); ssBox.className="superset";
        const h=document.createElement("div"); h.className="sshead";
        h.innerHTML=`<span class="chain">⇄</span> Superset ${it.ss} · back-to-back`;
        ssBox.appendChild(h);
        list.appendChild(ssBox);
      } else {
        const plus=document.createElement("div"); plus.className="ssplus"; plus.textContent="+";
        ssBox.appendChild(plus);
      }
      ssBox.appendChild(card);
    } else {
      ssCur=null; ssBox=null;
      list.appendChild(card);
    }
  });

  list.querySelectorAll("input").forEach(inp=>{
    if(inp.value) inp.classList.add("filled");
    inp.addEventListener("input",e=>{
      const ex=e.target.dataset.ex, i=+e.target.dataset.i, f=e.target.dataset.f;
      if(f==="r"){ const cleaned=e.target.value.replace(/[^0-9]/g,""); if(cleaned!==e.target.value) e.target.value=cleaned; }
      if(!weekData[ex]) weekData[ex]=[];
      if(!weekData[ex][i]) weekData[ex][i]={w:"",r:""};
      weekData[ex][i][f]=e.target.value;
      e.target.classList.toggle("filled",!!e.target.value);
      scheduleSave(); updateMeta();
    });
  });
  updateMeta();
}

function updateMeta(){
  $("#wnum").textContent="WEEK "+week;
  const w=countSets();
  $("#wsets").textContent=`${w.filled} / ${w.total} sets logged`;
  if(day<PROGRAM.length){
    const d=countDay(PROGRAM[day]);
    $("#progressBar").style.width=(d.total?(d.filled/d.total*100):0)+"%";
  }
  $("#copyBtn").textContent="Copy Wk "+(week-1);
  $("#copyBtn").disabled = week<=1;
}

let toastTimer=null;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1100);
}

async function changeWeek(delta){
  const next=week+delta; if(next<1||next>52) return;
  editingGoal=false;
  week=next; await loadWeek(); render();
  sSet("current_week",String(week));
}

$("#prevW").onclick=()=>changeWeek(-1);
$("#nextW").onclick=()=>changeWeek(1);
$("#copyBtn").onclick=async()=>{
  if(week<=1) return;
  const prev=await sGet("week_"+(week-1));
  if(!prev){ toast("Nothing in Week "+(week-1)); return; }
  const pdata=JSON.parse(prev);
  // copy weights only, leave reps blank for fresh logging
  Object.keys(pdata).forEach(ex=>{
    weekData[ex]=(pdata[ex]||[]).map(s=>({w:s.w||"",r:""}));
  });
  const prevc=await sGet("count_week_"+(week-1));
  if(prevc){ weekCounts=JSON.parse(prevc); await sSet("count_week_"+week, JSON.stringify(weekCounts)); }
  await sSet("week_"+week, JSON.stringify(weekData));
  render(); toast("Copied weights from Wk "+(week-1));
};

// ---- weekly export / print ----
function buildReportHTML(){
  const w=countSets();
  const bw = bodyweights[week]!=null?bodyweights[week]:"—";
  const goal = goalWeight!==""?goalWeight:"—";
  let h=`<div class="rpt">`;
  h+=`<h1>PROJECT 200 <span>— Week ${week}</span></h1>`;
  h+=`<div class="rmeta">Sets logged: <b>${w.filled} / ${w.total}</b> &nbsp;•&nbsp; Bodyweight: <b>${esc(String(bw))} lb</b> &nbsp;•&nbsp; Goal: <b>${esc(String(goal))} lb</b> &nbsp;•&nbsp; Date: ____________</div>`;
  if(checkinNotes[week]) h+=`<div class="rnote"><b>Notes:</b> ${esc(checkinNotes[week])}</div>`;
  PROGRAM.forEach(d=>{
    h+=`<h2>${esc(d.short)} — ${esc(d.title)}</h2><table><thead><tr><th>#</th><th>Exercise</th><th>Target</th><th>Logged sets (Wt × Reps)</th></tr></thead><tbody>`;
    d.items.forEach(it=>{ if(!it.name) return;
      const id=exId(d.key,it.n), n=getCount(d,it), arr=weekData[id]||[];
      const ss = it.ss?` (SS ${it.ss})`:"";
      let cells=[];
      for(let i=0;i<n;i++){ const s=arr[i]||{}; cells.push(`${(s.w||"·")} × ${(s.r||"·")}`); }
      h+=`<tr><td>${it.n}</td><td>${esc(getName(d,it))}${ss}</td><td>${esc(it.t)}</td><td>${esc(cells.join("   |   "))}</td></tr>`;
    });
    h+=`</tbody></table>`;
  });
  h+=`</div>`;
  return h;
}
$("#exportBtn").onclick=()=>{
  $("#printArea").innerHTML=buildReportHTML();
  window.print();
};

// ---- make installable: generate app icon + manifest at runtime ----
function makeIcon(size){
  try{
    const c=document.createElement("canvas"); c.width=c.height=size;
    const x=c.getContext("2d"); const s=size/512, cy=size/2;
    x.fillStyle="#0c0d11"; x.fillRect(0,0,size,size);
    x.fillStyle="#ff4d4d";
    const bar=(px,w,h)=>x.fillRect(px*s,cy-(h*s)/2,w*s,h*s);
    bar(150,212,30);            // bar
    bar(120,30,150); bar(86,26,104);   // left plates
    bar(362,30,150); bar(400,26,104);  // right plates
    return c.toDataURL("image/png");
  }catch(e){ return null; }
}
function setupInstall(){
  const icon=makeIcon(512); if(!icon) return;
  const apple=document.createElement("link");
  apple.rel="apple-touch-icon"; apple.href=icon; document.head.appendChild(apple);
  const manifest={ name:"Project 200", short_name:"Project 200", start_url:".",
    display:"standalone", background_color:"#0c0d11", theme_color:"#0c0d11",
    icons:[{src:icon,sizes:"512x512",type:"image/png",purpose:"any maskable"}] };
  try{
    const blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
    const link=document.createElement("link");
    link.rel="manifest"; link.href=URL.createObjectURL(blob); document.head.appendChild(link);
  }catch(e){}
}

(async function init(){
  setupInstall();
  customNames  = JSON.parse((await sGet("names"))||"null") || {};
  bodyweights  = JSON.parse((await sGet("bodyweights"))||"null") || {};
  checkinNotes = JSON.parse((await sGet("checkin_notes"))||"null") || {};
  const g = await sGet("goal_weight"); goalWeight = g!=null ? g : "";
  const cw=await sGet("current_week");
  week = cw ? parseInt(cw,10)||1 : 1;
  await loadWeek();
  render();
})();
window.addEventListener("beforeunload",()=>{ sSet("current_week",String(week)); });
</script>
